<style>
/* ============================================================
   SewQ — ported from the Claude Design handoff (SewQ.dc.html).
   Single-file web edition; same styling as the MAUI app.
   ============================================================ */

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { height: 100%; }
body { min-height: 100vh; background: #EDEAE4; font-family: 'Karla', sans-serif; }
button { font: inherit; color: inherit; background: none; border: none; padding: 0; cursor: pointer; }
input, select, textarea { font: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }

#app { min-height: 100vh; }
.app-loading { min-height: 100vh; display: flex; align-items: center; justify-content: center; font: 700 24px 'Lora', serif; color: #6E4A66; background: #F8F3F2; }

.app-root { min-height: 100vh; background: var(--bg); font-family: var(--font-sans); color: var(--ink); }
.screen { max-width: 520px; margin: 0 auto; padding: 20px 16px 120px; }
.screen-loading { text-align: center; padding: 60px 0; color: var(--ink-muted); font-size: 13px; }

/* ---------- header / list screen ---------- */
.app-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 16px; }
.app-logo { font-family: var(--font-serif); font-size: 23px; font-weight: 700; color: var(--primary); line-height: 1; }
.app-sub { font-size: 10.5px; color: var(--ink-muted); text-transform: uppercase; letter-spacing: .07em; margin-top: 3px; }
.btn-new { width: 100%; background: var(--primary); color: var(--primary-ink); border: none; border-radius: 12px; padding: 11px; font-weight: 700; font-size: 14px; cursor: pointer; margin-bottom: 16px; transition: filter .15s ease; }
.btn-new:hover { filter: brightness(1.08); }
.icon-btn { width: 34px; height: 34px; border-radius: 50%; background: none; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--ink-muted); font-size: 15px; flex: 0 0 auto; transition: transform .15s ease; }
.icon-btn:hover { background: var(--surface); color: var(--ink); border-color: var(--primary); transform: scale(1.08); }

.filter-row { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 16px; padding-bottom: 2px; scrollbar-width: none; }
.filter-row::-webkit-scrollbar { display: none; }
.filter-chip { appearance: none; -webkit-appearance: none; flex: 0 0 auto; font-size: 11.5px; font-weight: 700; padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--ink-muted); cursor: pointer; white-space: nowrap; }
.filter-chip:hover { border-color: var(--primary); }
.filter-chip.active { background: var(--primary); color: var(--primary-ink); border-color: var(--primary); }
.filter-chip .count { opacity: .7; font-weight: 600; }

.project-list { display: flex; flex-direction: column; gap: 12px; }
.project-card { background: var(--surface); border-radius: var(--radius-card); padding: 14px 16px; box-shadow: var(--shadow-card); border: var(--card-border); cursor: pointer; transition: transform .15s ease, box-shadow .15s ease; }
.project-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-card-hover); }
.project-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 9px; }
.project-name { font-weight: 700; font-size: 15.5px; color: var(--ink); }
.status-badge { display: inline-block; font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; padding: 4px 9px; border-radius: 20px; white-space: nowrap; }
.status-badge-btn { border: none; appearance: none; -webkit-appearance: none; cursor: pointer; display: inline-flex; align-items: center; gap: 3px; transition: filter .15s ease; }
.status-badge-btn:hover { filter: brightness(.94); }
.status-progress { background: var(--st-prog-bg); color: var(--st-prog-ink); }
.status-finished { background: var(--st-fin-bg); color: var(--st-fin-ink); }
.status-new { background: var(--st-new-bg); color: var(--st-new-ink); }

.project-card-bottom { display: flex; justify-content: space-between; align-items: baseline; padding-top: 9px; border-top: 1px solid var(--border); }
.total-amt { font-weight: 700; font-size: 15px; color: var(--ink); font-variant-numeric: tabular-nums; }

.sheet-close { background: none; border: none; font-size: 22px; color: var(--ink-muted); cursor: pointer; line-height: 1; padding: 0; }

.status-option:hover { border-color: var(--primary); }
.status-option.selected { border-color: var(--primary); background: var(--primary); color: var(--primary-ink); }
.sheet-actions { display: flex; gap: 10px; margin-top: 14px; }
.btn-cancel { background: none; border: none; color: var(--ink-muted); font-weight: 700; font-size: 14px; padding: 11px 14px; cursor: pointer; }

.btn-save:hover { filter: brightness(1.08); }

.settings-divider { height: 1px; background: var(--border); margin: 16px 0; }
.export-confirm { font-size: 11.5px; color: var(--accent); font-weight: 700; margin-top: 8px; }

.toggle-switch { appearance: none; -webkit-appearance: none; width: 44px; height: 26px; border-radius: 14px; background: var(--border); position: relative; cursor: pointer; border: none; padding: 0; flex: 0 0 auto; }
.toggle-switch.on { background: var(--primary); }
.toggle-thumb { position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 50%; background: #fff; transition: transform .15s ease; box-shadow: 0 1px 3px rgba(0,0,0,.25); }
.toggle-switch.on .toggle-thumb { transform: translateX(18px); }
.account-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.account-email { font-size: 12.5px; color: var(--ink); font-weight: 700; overflow-wrap: anywhere; }
.signout-btn { font-size: 12px; font-weight: 700; color: var(--danger); border: 1.5px solid var(--danger); border-radius: 10px; padding: 7px 12px; background: none; flex: 0 0 auto; }
.signout-btn:hover { background: var(--danger); color: #fff; }

/* ---------- auth screen ---------- */
.auth-screen { display: flex; flex-direction: column; justify-content: center; min-height: 100vh; padding-bottom: 60px; }
.auth-logo { text-align: center; margin-bottom: 22px; }
.auth-logo .app-logo { font-size: 34px; }
.auth-logo .app-sub { margin-top: 6px; }
.auth-card { background: var(--surface); border-radius: var(--radius-card); border: var(--card-border); box-shadow: var(--shadow-card); padding: 20px 18px; }
.auth-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.auth-tab { flex: 1; padding: 9px; border-radius: 12px; border: 1.5px solid var(--border); background: var(--bg); color: var(--ink-muted); font-weight: 700; font-size: 13px; cursor: pointer; }
.auth-tab:hover { border-color: var(--primary); }
.auth-tab.active { border-color: var(--primary); background: var(--primary); color: var(--primary-ink); }
.auth-error { color: var(--danger); font-size: 12px; margin: -4px 0 12px; }
.auth-info { color: var(--accent); font-size: 12px; font-weight: 700; margin: -4px 0 12px; line-height: 1.5; }
.auth-submit { width: 100%; margin-top: 2px; }
.auth-foot { text-align: center; font-size: 11px; color: var(--ink-muted); margin-top: 14px; }

/* ---------- toast ---------- */
.toast { position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%) translateY(16px); background: #A5423A; color: #fff; padding: 10px 16px; border-radius: 12px; font-size: 13px; z-index: 50; opacity: 0; pointer-events: none; transition: opacity .25s ease, transform .25s ease; max-width: 90vw; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ---------- themes (verbatim from the design) ---------- */

<script>
'use strict';
(function () {

/* ============================ Supabase config ============================ */

const SUPABASE_URL = 'https://irvfpbbsovnyvpbdflhd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_j8RmhmvmHmPIAj77FRCKsg_gAxYoDDR';
const SESSION_KEY = 'sewq.session';
const THEME_CACHE_KEY = 'sewq.theme';

/* ============================ Session / auth ============================= */

let session = null;

function loadSession() {
  try { session = JSON.parse(localStorage.getItem(SESSION_KEY)); }
  catch { session = null; }
}

function saveSession(s) {
  session = s;
  if (s) localStorage.setItem(SESSION_KEY, JSON.stringify(s));
  else localStorage.removeItem(SESSION_KEY);
}

function sessionFromTokenResponse(j) {
  return {
    access_token: j.access_token,
    refresh_token: j.refresh_token,
    expires_at: j.expires_at || Math.floor(Date.now() / 1000) + (j.expires_in || 3600),
    user: { id: j.user && j.user.id, email: j.user && j.user.email },
  };
}

function authErrorMessage(j, fallback) {
  return (j && (j.error_description || j.msg || j.message)) || fallback;
}

async function signIn(email, password) {
  const res = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
    method: 'POST',
    headers: { apikey: SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password }),
  });
  const j = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(authErrorMessage(j, 'Sign in failed.'));
  saveSession(sessionFromTokenResponse(j));
}

/** Returns 'session' when signed straight in, 'confirm' when email confirmation is required. */
async function signUp(email, password) {
  const res = await fetch(SUPABASE_URL + '/auth/v1/signup', {
    method: 'POST',
    headers: { apikey: SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password }),
  });
  const j = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(authErrorMessage(j, 'Registration failed.'));
  if (j.access_token) { saveSession(sessionFromTokenResponse(j)); return 'session'; }
  const user = j.user || (j.id ? j : null);
  if (user && Array.isArray(user.identities) && user.identities.length === 0)
    throw new Error('An account with this email already exists — try signing in.');
  return 'confirm';
}

async function refreshSession() {
  if (!session || !session.refresh_token) return false;
  try {
    const res = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=refresh_token', {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: session.refresh_token }),
    });
    if (!res.ok) return false;
    const j = await res.json();
    saveSession(sessionFromTokenResponse(j));
    return true;
  } catch { return false; }
}

async function signOut() {
  try {
    if (session) {
      await fetch(SUPABASE_URL + '/auth/v1/logout', {
        method: 'POST',
        headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + session.access_token },
      });
    }
  } catch { /* best effort */ }
  saveSession(null);
  state.settings = null;
  closeSheet();
  renderAuth('signin');
}

async function authedFetch(path, opts, retry) {
  if (retry === undefined) retry = true;
  if (session && session.expires_at * 1000 - Date.now() < 60000) await refreshSession();
  const headers = Object.assign(
    { apikey: SUPABASE_KEY, 'Content-Type': 'application/json' },
    session ? { Authorization: 'Bearer ' + session.access_token } : {},
    (opts && opts.headers) || {});
  const res = await fetch(SUPABASE_URL + path, Object.assign({}, opts, { headers }));
  if (res.status === 401 && retry && session) {
    if (await refreshSession()) return authedFetch(path, opts, false);
    saveSession(null);
    renderAuth('signin');
    throw new Error('Session expired — please sign in again.');
  }
  return res;
}

/* ============================== REST helpers ============================= */

async function rest(method, pathAndQuery, body, prefer) {
  const opts = { method };
  if (body !== undefined) opts.body = JSON.stringify(body);
  if (prefer) opts.headers = { Prefer: prefer };
  const res = await authedFetch('/rest/v1/' + pathAndQuery, opts);
  if (!res.ok) {
    let msg = 'Request failed (' + res.status + ')';
    try { const j = await res.json(); msg = j.message || j.error_description || msg; } catch { /* keep default */ }
    const err = new Error(msg);
    err.status = res.status;
    throw err;
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

const db = {
  select: (q) => rest('GET', q),
  insert: (table, row) => rest('POST', table, row, 'return=representation'),
  update: (q, patch) => rest('PATCH', q, patch),
  remove: (q) => rest('DELETE', q),
};

/* ============================ Display helpers ============================ */

const STATUSES = ['NotStarted', 'InProgress', 'Finished', 'Abandoned'];
const STATUS_LABEL = { NotStarted: 'Not started', InProgress: 'In progress', Finished: 'Finished', Abandoned: 'Abandoned' };
const STATUS_CSS = { NotStarted: 'status-new', InProgress: 'status-progress', Finished: 'status-finished', Abandoned: 'status-abandoned' };
const THEMES = ['Atelier', 'CraftRoom', 'Studio'];
const THEME_LABEL = { Atelier: 'Atelier', CraftRoom: 'Craft Room', Studio: 'Studio' };
const THEME_CSS = { Atelier: 'theme-a', CraftRoom: 'theme-b', Studio: 'theme-c' };
const CURRENCY_SYMBOL = { EUR: '€', USD: '$', GBP: '£' };
const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g,
  (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

function currencySymbol() { return CURRENCY_SYMBOL[(state.settings && state.settings.Currency) || 'EUR'] || '€'; }
function money(v) { return currencySymbol() + (Number(v) || 0).toFixed(2); }
function compact(v) { return String(parseFloat((Number(v) || 0).toFixed(2))); }

function parseDec(text) {
  if (text == null || !String(text).trim()) return 0;
  const v = parseFloat(String(text).trim().replace(',', '.'));
  return isNaN(v) ? 0 : v;
}

/** "just now" / "today" / "yesterday" / "3 days ago" / "12 Mar 2026" */
function relative(iso) {
  const d = new Date(iso);
  const now = new Date();
  if (now - d < 60000) return 'just now';
  const startOfDay = (x) => new Date(x.getFullYear(), x.getMonth(), x.getDate());
  const days = Math.round((startOfDay(now) - startOfDay(d)) / 86400000);
  if (days <= 0) return 'today';
  if (days === 1) return 'yesterday';
  if (days < 7) return days + ' days ago';
  return d.getDate() + ' ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear();
}

function cachedThemeClass() {
  try {
    const t = JSON.parse(localStorage.getItem(THEME_CACHE_KEY));
    if (t) return (THEME_CSS[t.Theme] || 'theme-a') + (t.DarkMode ? ' dark' : '');

}

/* ============================== Bottom sheet ============================= */

function openSheet(title, bodyHtml, onSave) {

  sheetOnSave = null;

  if (sh) sh.classList.remove('show');
}

function setSheetError(msg) {
  const el = $('#sheetError');
  if (!el) return;
  el.style.display = msg ? '' : 'none';
  el.textContent = msg || '';
}

async function saveSheet() {
  if (!sheetOnSave) { closeSheet(); return; }
  const btn = $('#sheetSave');
  btn.disabled = true;
  try {
    const keepOpen = await sheetOnSave();
    if (keepOpen !== true) closeSheet();
  } catch (e) {
    setSheetError(e.message || 'Something went wrong.');
  } finally {
    btn.disabled = false;
  }
}

function requireValue(v) {
  if (!String(v || '').trim()) { setSheetError('This field is required.'); return true; }
  return false;
}

/* ================================ Settings =============================== */

const DEFAULT_SETTINGS = { Theme: 'Atelier', DarkMode: false, DefaultHourlyRate: 8, Currency: 'EUR' };

async function ensureSettings() {
  const rows = await db.select('Settings?select=*&limit=1');
  if (rows && rows.length) return rows[0];
  try {
    const created = await db.insert('Settings', DEFAULT_SETTINGS);
    return created[0];
  } catch (e) {
    // Unique-violation race (e.g. two tabs): the row exists now, refetch.
    const retry = await db.select('Settings?select=*&limit=1');
    if (retry && retry.length) return retry[0];
    throw e;
  }
}

function persistSettings(patch) {
  Object.assign(state.settings, patch);
  return db.update('Settings?Id=eq.' + state.settings.Id, patch);
}

function navigate(hash) { location.hash = hash; }

async function onRoute() {

        '<div class="auth-info" id="authInfo" style="display:none"></div>' +

      '<div class="auth-foot">Your projects are stored in your own account.</div>' +
    '</div>');

  const showError = (msg) => { const e = $('#authError'); e.style.display = msg ? '' : 'none'; e.textContent = msg || ''; };
  const showInfo = (msg) => { const e = $('#authInfo'); e.style.display = msg ? '' : 'none'; e.textContent = msg || ''; };

  $('#tabSignin').addEventListener('click', () => renderAuth('signin'));
  $('#tabRegister').addEventListener('click', () => renderAuth('register'));

  async function submit() {
    showError(null); showInfo(null);
    const email = $('#authEmail').value.trim();
    const password = $('#authPassword').value;
    if (!email) { showError('Email is required.'); return; }
    if (!password) { showError('Password is required.'); return; }
    if (isRegister) {
      if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }
      if (password !== $('#authPassword2').value) { showError('Passwords do not match.'); return; }
    }
    const btn = $('#authSubmit');
    btn.disabled = true;
    btn.textContent = isRegister ? 'Creating…' : 'Signing in…';
    try {
      if (isRegister) {
        const outcome = await signUp(email, password);
        if (outcome === 'confirm') {
          showInfo('Almost there! Check your email and click the confirmation link, then come back here and sign in. (You can close the tab the link opens.)');
          return;
        }
      } else {
        await signIn(email, password);
      }
      await enterApp();
    } catch (e) {
      showError(e.message || 'Something went wrong.');
    } finally {
      btn.disabled = false;
      btn.textContent = isRegister ? 'Create account' : 'Sign in';
    }
  }

  $('#authSubmit').addEventListener('click', submit);
  $('#screen').querySelectorAll('input').forEach((el) =>
    el.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') submit(); }));
}

async function exportBackup() {
  const rows = await db.select(
    'Projects?select=*,Measurements(*),Materials(*),LabourEntries(*),MachineSettings(*)' +
    '&order=CreatedAt.asc&Measurements.order=CreatedAt.asc&Materials.order=CreatedAt.asc' +
    '&LabourEntries.order=CreatedAt.asc&MachineSettings.order=CreatedAt.asc');
  const s = state.settings;
  const payload = {
    app: 'SewQ',
    version: 1,
    exportedAt: new Date().toISOString(),
    settings: { theme: s.Theme, darkMode: s.DarkMode, defaultHourlyRate: Number(s.DefaultHourlyRate), currency: s.Currency },
    projects: rows.map((p) => ({
      id: p.Id, name: p.Name, status: p.Status, createdAt: p.CreatedAt, updatedAt: p.UpdatedAt,
      measurements: p.Measurements.map((m) => ({ id: m.Id, name: m.Name, value: m.Value, unit: m.Unit, notes: m.Notes })),
      materials: p.Materials.map((m) => ({ id: m.Id, name: m.Name, cost: Number(m.Cost), notes: m.Notes })),
      labour: p.LabourEntries.map((l) => ({ id: l.Id, task: l.Task, hours: Number(l.Hours), rate: Number(l.Rate), cost: Number(l.Hours) * Number(l.Rate), notes: l.Notes })),
      machineSettings: p.MachineSettings.map((m) => ({ id: m.Id, title: m.Title, fabric: m.Fabric, notes: m.Notes })),
    })),
  };
  const now = new Date();
  const pad = (n) => String(n).padStart(2, '0');
  const fileName = 'sewq-backup-' + now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate()) +
                   '-' + pad(now.getHours()) + pad(now.getMinutes()) + '.json';
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = fileName;
  a.click();
  URL.revokeObjectURL(a.href);
}

    '<div class="screen">' +
      '<div class="details-header">' +
        '<button class="back-btn" id="btnBack" aria-label="Back">←</button>' +
        '<div class="details-title">' + esc(p.Name) + '</div>' +
      '</div>' +
      '<div class="details-status-row">' +
        '<button class="status-badge status-badge-btn ' + STATUS_CSS[p.Status] + '" id="btnStatus">' +
          STATUS_LABEL[p.Status] + ' ▾</button>' +
      '</div>' +
      '<div class="summary-card">' +
        '<div class="summary-label">Total cost</div>' +
        '<div class="summary-total">' + money(p.TotalCost) + '</div>' +
        '<div class="summary-sub">' +
          '<span>Materials ' + money(p.MaterialsTotal) + '</span>' +
          '<span>Labour ' + money(p.LabourTotal) + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="quickadd-grid">' +
        '<button class="quickadd-btn" data-add="material">+ Material</button>' +
        '<button class="quickadd-btn" data-add="labour">+ Labour</button>' +
        '<button class="quickadd-btn" data-add="measurement">+ Measurement</button>' +
        '<button class="quickadd-btn" data-add="machine">+ Machine</button>' +
      '</div>' +
      '<div class="section" data-section="measurement">' +
        '<div class="section-head"><span class="section-title">Measurements</span></div>' +
        (p.Measurements.length ? '' : '<div class="empty-note">No measurements yet.</div>') +
        '<div class="item-list">' + measurements + '</div>' +
        '<button class="add-link-btn" data-add="measurement">+ Add measurement</button>' +
      '</div>' +
      '<div class="section" data-section="material">' +
        '<div class="section-head"><span class="section-title">Materials</span>' +
          '<span class="section-total">' + money(p.MaterialsTotal) + '</span></div>' +
        (p.Materials.length ? '' : '<div class="empty-note">No materials yet.</div>') +
        '<div class="item-list">' + materials + '</div>' +
        '<button class="add-link-btn" data-add="material">+ Add material</button>' +
      '</div>' +
      '<div class="section" data-section="labour">' +
        '<div class="section-head"><span class="section-title">Labour</span>' +
          '<span class="section-total">' + money(p.LabourTotal) + '</span></div>' +
        (p.LabourEntries.length ? '' : '<div class="empty-note">No labour logged yet.</div>') +
        '<div class="item-list">' + labour + '</div>' +
        '<button class="add-link-btn" data-add="labour">+ Add labour</button>' +
      '</div>' +
      '<div class="section" data-section="machine">' +
        '<div class="section-head"><span class="section-title">Machine Settings</span></div>' +
        (p.MachineSettings.length ? '' : '<div class="empty-note">No machine settings yet.</div>') +
        '<div class="item-list">' + machines + '</div>' +
        '<button class="add-link-btn" data-add="machine">+ Add machine setting</button>' +
      '</div>' +
    '</div>');

  $('#btnBack').addEventListener('click', () => navigate('#/'));
  $('#btnStatus').addEventListener('click', openStatusSheet);
  $('#screen').querySelectorAll('[data-add]').forEach((el) =>
    el.addEventListener('click', () => openItemSheet(el.dataset.add, null)));
  $('#screen').querySelectorAll('[data-section]').forEach((sectionEl) => {
    const kind = sectionEl.dataset.section;
    sectionEl.querySelectorAll('[data-edit]').forEach((el) =>
      el.addEventListener('click', () => openItemSheet(kind, el.dataset.edit)));
    sectionEl.querySelectorAll('[data-delete]').forEach((el) =>
      el.addEventListener('click', () => deleteItem(kind, el.dataset.delete)));
  });
}

const KIND_TABLE = { material: 'Materials', labour: 'LabourEntries', measurement: 'Measurements', machine: 'MachineSettings' };

function findItem(kind, id) {
  const p = state.project;
  const list = { material: p.Materials, labour: p.LabourEntries, measurement: p.Measurements, machine: p.MachineSettings }[kind];
  return list.find((x) => x.Id === id) || null;
}

async function touchProject() {
  await db.update('Projects?Id=eq.' + state.project.Id, { UpdatedAt: new Date().toISOString() });
}

async function reloadProject() { await loadProjectScreen(state.project.Id); }

function openItemSheet(kind, editId) {
  const editing = editId ? findItem(kind, editId) : null;
  const cur = currencySymbol();
  let title = '', body = '', onSave = null;

  if (kind === 'material') {
    title = editing ? 'Edit Material' : 'Add Material';
    body =
      '<div class="field"><label>Name</label>' +
        '<input class="form-control" id="fName" placeholder="e.g. Linen fabric" value="' + esc(editing ? editing.Name : '') + '"></div>' +
      '<div class="field"><label>Cost (' + cur + ')</label>' +
        '<input class="form-control" id="fCost" type="number" step="0.01" placeholder="0.00" value="' + (editing ? esc(compact(editing.Cost)) : '') + '"></div>' +
      '<div class="field"><label>Notes</label>' +
        '<textarea class="form-control" id="fNotes" rows="2" placeholder="Optional">' + esc(editing ? editing.Notes : '') + '</textarea></div>';
    onSave = async () => {
      const name = $('#fName').value;
      if (requireValue(name)) return true;
      const row = { Name: name.trim(), Cost: parseDec($('#fCost').value), Notes: $('#fNotes').value.trim() };
      if (editing) await db.update('Materials?Id=eq.' + editing.Id, row);
      else await db.insert('Materials', Object.assign({ ProjectId: state.project.Id }, row));
      await touchProject();
      await reloadProject();
    };
  } else if (kind === 'labour') {
    title = editing ? 'Edit Labour' : 'Add Labour';
    const hours = editing ? compact(editing.Hours) : '';
    const rate = editing ? compact(editing.Rate) : compact(state.settings.DefaultHourlyRate);
    body =
      '<div class="field"><label>Task name</label>' +
        '<input class="form-control" id="fTask" placeholder="e.g. Sewing" value="' + esc(editing ? editing.Task : '') + '"></div>' +
      '<div class="two-col">' +
        '<div class="field"><label>Hours</label>' +
          '<input class="form-control" id="fHours" type="number" step="0.25" placeholder="0" value="' + esc(hours) + '"></div>' +
        '<div class="field"><label>Rate (' + cur + '/h)</label>' +
          '<input class="form-control" id="fRate" type="number" step="0.5" placeholder="8.00" value="' + esc(rate) + '"></div>' +
      '</div>' +
      '<div class="cost-preview" id="costPreview"></div>' +
      '<div class="field"><label>Notes</label>' +
        '<textarea class="form-control" id="fNotes" rows="2" placeholder="Optional">' + esc(editing ? editing.Notes : '') + '</textarea></div>';
    onSave = async () => {
      const task = $('#fTask').value;
      if (requireValue(task)) return true;
      const row = { Task: task.trim(), Hours: parseDec($('#fHours').value), Rate: parseDec($('#fRate').value), Notes: $('#fNotes').value.trim() };
      if (editing) await db.update('LabourEntries?Id=eq.' + editing.Id, row);
      else await db.insert('LabourEntries', Object.assign({ ProjectId: state.project.Id }, row));
      await touchProject();
      await reloadProject();
    };
  } else if (kind === 'measurement') {
    title = editing ? 'Edit Measurement' : 'Add Measurement';
    body =
      '<div class="field"><label>Name</label>' +
        '<input class="form-control" id="fName" placeholder="e.g. Waist" value="' + esc(editing ? editing.Name : '') + '"></div>' +
      '<div class="two-col">' +
        '<div class="field"><label>Value</label>' +
          '<input class="form-control" id="fValue" placeholder="72" value="' + esc(editing ? editing.Value : '') + '"></div>' +
        '<div class="field"><label>Unit</label>' +
          '<input class="form-control" id="fUnit" placeholder="cm" value="' + esc(editing ? editing.Unit : 'cm') + '"></div>' +
      '</div>' +
      '<div class="field"><label>Notes</label>' +
        '<textarea class="form-control" id="fNotes" rows="2" placeholder="Optional">' + esc(editing ? editing.Notes : '') + '</textarea></div>';
    onSave = async () => {
      const name = $('#fName').value;
      if (requireValue(name)) return true;
      const unit = $('#fUnit').value;
      const row = { Name: name.trim(), Value: $('#fValue').value.trim(),
                    Unit: unit.trim() ? unit.trim() : 'cm', Notes: $('#fNotes').value.trim() };
      if (editing) await db.update('Measurements?Id=eq.' + editing.Id, row);
      else await db.insert('Measurements', Object.assign({ ProjectId: state.project.Id }, row));
      await touchProject();
      await reloadProject();
    };
  } else {
    title = editing ? 'Edit Machine Setting' : 'Add Machine Setting';
    body =
      '<div class="field"><label>Title</label>' +
        '<input class="form-control" id="fTitle" placeholder="e.g. Thin linen" value="' + esc(editing ? editing.Title : '') + '"></div>' +
      '<div class="field"><label>Fabric type</label>' +
        '<input class="form-control" id="fFabric" placeholder="e.g. Linen" value="' + esc(editing ? editing.Fabric : '') + '"></div>' +
      '<div class="field"><label>Notes</label>' +
        '<textarea class="form-control" id="fNotes" rows="5" placeholder="Straight stitch, length 2.5, tension 4...">' + esc(editing ? editing.Notes : '') + '</textarea></div>';
    onSave = async () => {
      const t = $('#fTitle').value;
      if (requireValue(t)) return true;
      const row = { Title: t.trim(), Fabric: $('#fFabric').value.trim(), Notes: $('#fNotes').value.trim() };
      if (editing) await db.update('MachineSettings?Id=eq.' + editing.Id, row);
      else await db.insert('MachineSettings', Object.assign({ ProjectId: state.project.Id }, row));
      await touchProject();
      await reloadProject();
    };
  }

  openSheet(title, body, onSave);

  if (kind === 'labour') {
    const update = () => {
      $('#costPreview').textContent = 'Cost: ' + money(parseDec($('#fHours').value) * parseDec($('#fRate').value));
    };
    $('#fHours').addEventListener('input', update);
    $('#fRate').addEventListener('input', update);
    update();
  }
}

async function deleteItem(kind, id) {
  try {
    await db.remove(KIND_TABLE[kind] + '?Id=eq.' + id);
    await touchProject();
    await reloadProject();
  } catch (e) {
    toast(e.message || 'Delete failed.');
  }
}

function openStatusSheet() {
  let selected = state.project.Status;
  openSheet('Change Status',
    '<div class="field"><label>Status</label><div class="status-options" id="statusOptions">' +
      STATUSES.map((s) =>
        '<button class="status-option ' + (selected === s ? 'selected' : '') + '" data-status="' + s + '">' + STATUS_LABEL[s] + '</button>').join('') +
    '</div></div>',
    async () => {
      await db.update('Projects?Id=eq.' + state.project.Id,
        { Status: selected, UpdatedAt: new Date().toISOString() });
      await reloadProject();
    });
  $('#statusOptions').querySelectorAll('.status-option').forEach((el) =>
    el.addEventListener('click', () => {
      selected = el.dataset.status;
      $('#statusOptions').querySelectorAll('.status-option').forEach((b) =>
        b.classList.toggle('selected', b === el));
    }));
}

/* ================================ Startup ================================ */

async function enterApp() {
  state.settings = await ensureSettings();
  applyTheme();
  if (!location.hash || location.hash === '#') location.hash = '#/';
  await onRoute();
}

async function start() {
  loadSession();
  if (!session) { renderAuth('signin'); return; }
  const stillValid = session.expires_at * 1000 > Date.now() + 60000 || await refreshSession();
  if (!stillValid) { saveSession(null); renderAuth('signin'); return; }
  try {
    await enterApp();
  } catch (e) {
    renderAuth('signin');
    const el = $('#authError');
    if (el) { el.style.display = ''; el.textContent = e.message || 'Could not load your data — please sign in again.'; }
  }
}

window.addEventListener('hashchange', onRoute);
start();

})();
</script>
